<div class="modal-header bg-danger text-white border-0 py-3 py-md-4">
    <h5 class="modal-title fw-bold">
        <i class="bi bi-person-plus me-2"></i> Agregar Cliente
    </h5>
    <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
</div>

<div class="modal-body p-4 p-md-5">
    <form #clienteForm="ngForm">
        <div class="row g-3 g-md-4">
            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">DNI <span class="text-danger">*</span></label>
                <div class="input-group">
                    <input type="text" class="form-control" maxlength="8"
                        [(ngModel)]="nuevoCliente.dni" (input)="validarDni()" name="dni"
                        placeholder="8 dígitos" [ngClass]="{'is-invalid': errorDni}" required>
                    <span class="input-group-text" *ngIf="consultandoDni">
                        <span class="spinner-border spinner-border-sm text-danger"></span>
                    </span>
                </div>
                <div class="text-danger small mt-2" *ngIf="errorDni">Debe tener 8 números.</div>
                <div class="text-success small mt-2" *ngIf="dniValidado">DNI validado por RENIEC.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">Estado</label>
                <select class="form-select" [(ngModel)]="nuevoCliente.estado" name="estado">
                    <option value="Activo">Activo</option>
                    <option value="Inactivo">Inactivo</option>
                </select>
            </div>

            <div class="col-12">
                <label class="form-label fw-bold small mb-2">Nombres</label>
                <input type="text" class="form-control" [(ngModel)]="nuevoCliente.nombre" 
                       name="nombre" [readonly]="dniValidado" [ngClass]="{'bg-light': dniValidado, 'is-invalid': permiteEdicionManual && !nuevoCliente.nombre?.trim()}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">Apellido Paterno</label>
                <input type="text" class="form-control" [(ngModel)]="nuevoCliente.apellido_paterno" 
                       name="apellido_paterno" [readonly]="dniValidado" [ngClass]="{'bg-light': dniValidado, 'is-invalid': permiteEdicionManual && !nuevoCliente.apellido_paterno?.trim()}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">Apellido Materno</label>
                <input type="text" class="form-control" [(ngModel)]="nuevoCliente.apellido_materno" 
                       name="apellido_materno" [readonly]="dniValidado" [ngClass]="{'bg-light': dniValidado, 'is-invalid': permiteEdicionManual && !nuevoCliente.apellido_materno?.trim()}" required>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">Celular</label>
                <input type="text" maxlength="9" class="form-control"
                    [(ngModel)]="nuevoCliente.celular" (input)="validarCelular()" name="celular"
                    placeholder="9XXXXXXXX" [ngClass]="{'is-invalid': errorCelular || (permiteEdicionManual && !nuevoCliente.celular?.trim())}">
                <div class="text-danger small mt-2" *ngIf="errorCelular">Debe comenzar con 9 y tener 9 dígitos.</div>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small mb-2">Correo Electrónico</label>
                <div class="input-group">
                    <input type="email" class="form-control" [(ngModel)]="nuevoCliente.correo" 
                           (input)="validarCorreo()" name="correo" placeholder="correo@dominio.com"
                           [readonly]="correoValidado" [ngClass]="{'bg-light': correoValidado, 'is-invalid': errorCorreo}">
                    <button *ngIf="!correoValidado && !validandoCorreo && !permiteEdicionManual" class="btn btn-outline-success" type="button" (click)="validarCorreoBackend()">
                        Validar
                    </button>
                    <span class="input-group-text" *ngIf="validandoCorreo">
                        <span class="spinner-border spinner-border-sm text-success"></span>
                    </span>
                </div>
                <div class="text-success small mt-2" *ngIf="correoValidado">Correo validado.</div>
            </div>

            <div class="col-12 mt-4">
                <div class="p-4 bg-light rounded">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold text-danger mb-0">Vehículos del Cliente</h6>
                        <button type="button" class="btn btn-sm btn-danger" (click)="abrirModalVehiculo()">
                            <i class="bi bi-plus-circle me-1"></i> Agregar
                        </button>
                    </div>
                    <div *ngIf="vehiculos.length > 0">
                        <div *ngFor="let veh of vehiculos" class="card mb-2">
                            <div class="card-body p-3 d-flex justify-content-between align-items-center">
                                <div>
                                    <div class="fw-bold">{{ veh.placa }}</div>
                                    <div class="small text-muted">{{ veh.marca }} {{ veh.modelo }}</div>
                                </div>
                                <button type="button" class="btn btn-sm btn-outline-danger" (click)="eliminarVehiculo(veh)">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div *ngIf="vehiculos.length === 0" class="text-center text-muted py-3">
                        <i class="bi bi-car me-2"></i>Sin vehículos registrados
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<div class="modal-footer border-0 p-4 p-md-5">
    <button class="btn btn-outline-secondary" (click)="cerrarModal()">Cancelar</button>
    <button class="btn btn-danger" (click)="guardarCliente()" [disabled]="!puedeGuardar">
        Guardar Cliente
    </button>
</div>

<div class="modal d-block" *ngIf="mostrarModalVehiculo" style="background: rgba(0,0,0,0.5);">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Agregar Vehículo</h5>
                <button type="button" class="btn-close btn-close-white" (click)="cerrarModalVehiculo()"></button>
            </div>
            <div class="modal-body">
                <input class="form-control mb-2" [(ngModel)]="nuevoVehiculo.placa" placeholder="Placa">
                <input class="form-control mb-2" [(ngModel)]="nuevoVehiculo.marca" placeholder="Marca">
                <input class="form-control mb-2" [(ngModel)]="nuevoVehiculo.modelo" placeholder="Modelo">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" (click)="cerrarModalVehiculo()">Cancelar</button>
                <button class="btn btn-danger" (click)="agregarVehiculoLista()">Agregar a lista</button>
            </div>
        </div>
    </div>
</div>
