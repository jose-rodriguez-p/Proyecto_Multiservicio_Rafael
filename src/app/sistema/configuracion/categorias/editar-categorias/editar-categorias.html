<div class="bg-white rounded-3 overflow-hidden">
    <div class="modal-header border-0 px-4 pt-4 pb-3 bg-dark">
        <div class="d-flex align-items-center gap-3">
            <div style="width:40px;height:40px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;">
                <i class="bi bi-pencil-square text-white fs-5"></i>
            </div>
            <div>
                <h5 class="fw-bold mb-0 text-white">Editar Categoría</h5>
                <small class="text-white" style="opacity:0.7;">Modifica el nombre de la categoría</small>
            </div>
        </div>
    </div>

    <div class="modal-body p-4">
        <div class="mb-3">
            <label class="form-label fw-semibold small">
                <i class="bi bi-tag me-1 text-danger"></i> Nombre <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control bg-light"
                [(ngModel)]="nombre"
                readonly
                placeholder="Nombre de la categoría..." />
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold small">
                <i class="bi bi-toggle-on me-1 text-danger"></i> Estado
            </label>
            <select class="form-select form-select-sm" [(ngModel)]="estado" (change)="validar()">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
            </select>
        </div>
    </div>

    <div class="modal-footer border-0 bg-light px-4 py-3">
        <button class="btn btn-light border fw-medium px-4" (click)="cancelar()">Cancelar</button>
        <button class="btn btn-danger fw-medium px-4" (click)="guardar()">
            <i class="bi bi-save me-2"></i> Guardar Cambios
        </button>
    </div>
</div>
