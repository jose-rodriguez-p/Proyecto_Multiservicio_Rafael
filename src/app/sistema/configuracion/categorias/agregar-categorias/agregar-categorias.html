<div class="bg-white rounded-3 overflow-hidden">
    <div class="modal-header border-0 px-4 pt-4 pb-3" style="background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%);">
        <div class="d-flex align-items-center gap-3">
            <div style="width:40px;height:40px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;">
                <i class="bi bi-plus-circle text-white fs-5"></i>
            </div>
            <div>
                <h5 class="fw-bold mb-0 text-white">Nueva Categoría</h5>
                <small class="text-white" style="opacity:0.8;">Complete el nombre de la nueva categoría</small>
            </div>
        </div>
    </div>

    <div class="modal-body p-4">
        <div class="mb-3">
            <label class="form-label fw-semibold small">
                <i class="bi bi-tag me-1 text-danger"></i> Nombre <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control"
                [(ngModel)]="nombre"
                (input)="validar()"
                placeholder="Ej: Lubricantes, Frenos, Filtros..."
                [ngClass]="{'is-invalid': error, 'is-valid': nombre.trim() && !error}" />
            <div class="invalid-feedback">{{ mensajeError }}</div>
            <div class="valid-feedback">Nombre disponible.</div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold small">
                <i class="bi bi-toggle-on me-1 text-danger"></i> Estado
            </label>
            <select class="form-select form-select-sm" [(ngModel)]="estado">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
            </select>
        </div>
    </div>

    <div class="modal-footer border-0 bg-light px-4 py-3">
        <button class="btn btn-light border fw-medium px-4" (click)="cancelar()">Cancelar</button>
        <button class="btn btn-danger fw-medium px-4" (click)="guardar()"
            [disabled]="!nombre.trim() || error">
            <i class="bi bi-save me-2"></i> Guardar
        </button>
    </div>
</div>
