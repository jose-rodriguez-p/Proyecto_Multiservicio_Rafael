<div class="bg-white rounded-3 overflow-hidden">
  <div class="p-3 text-white" style="background: linear-gradient(135deg, #b91c1c, #dc2626);">
    <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Nuevo Servicio</h5>
  </div>
  <div class="p-3">
    <div class="mb-3">
      <label class="form-label fw-semibold small">Nombre del servicio *</label>
      <input type="text" class="form-control" [(ngModel)]="nombre" (input)="error = false"
        placeholder="Ej: Cambio de aceite" maxlength="100"
        [ngClass]="{'is-invalid': error && !nombre.trim()}">
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold small">Precio *</label>
      <div class="input-group">
        <span class="input-group-text">S/</span>
        <input type="number" class="form-control" [(ngModel)]="precio" (input)="error = false"
          placeholder="0.00" min="0.01" step="0.01">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold small">Estado</label>
      <select class="form-select" [(ngModel)]="estado">
        <option value="Activo">Activo</option>
        <option value="Inactivo">Inactivo</option>
      </select>
    </div>
    <div class="text-danger small mb-3" *ngIf="error">{{ mensajeError }}</div>
  </div>
  <div class="d-flex justify-content-end gap-2 p-3 border-top">
    <button class="btn btn-outline-secondary btn-sm" (click)="cerrar()">Cancelar</button>
    <button class="btn btn-danger btn-sm" (click)="guardar()"
      [disabled]="!nombre.trim() || !precio">Guardar</button>
  </div>
</div>
