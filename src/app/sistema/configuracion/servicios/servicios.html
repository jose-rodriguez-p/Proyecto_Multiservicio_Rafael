<div class="servicios-page" *ngIf="!showAgregarOverlay && !showEditarOverlay">
  <div class="servicios-header">
    <div>
      <div class="servicios-titulo">
        <i class="bi bi-wrench servicios-titulo-icono"></i>
        Servicios de Mantenimiento
      </div>
      <p class="text-muted small mb-0">Lista de servicios con sus repuestos asociados.</p>
    </div>
    <button class="btn btn-nuevo-servicio" (click)="abrirAgregar()">
      <i class="bi bi-plus-lg me-1"></i> Nuevo Servicio
    </button>
  </div>

  <div class="servicios-filtros">
    <div class="input-group">
      <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
      <input type="text" class="form-control" placeholder="Buscar servicio..."
        [(ngModel)]="filtroNombre">
    </div>
    <select class="form-select" [(ngModel)]="filtroEstado">
      <option value="Activo">Activos</option>
      <option value="Inactivo">Inactivos</option>
      <option value="">Todos</option>
    </select>
  </div>

  <!-- Grid de servicios -->
  <div class="serv-grid" *ngIf="!cargando && serviciosFiltrados.length > 0">
    <div *ngFor="let s of serviciosFiltrados" class="serv-card">

      <div class="serv-card-head">
        <div class="serv-card-icono">
          <i class="bi bi-tools"></i>
        </div>
        <div class="flex-grow-1">
          <div class="serv-card-nombre">{{ s.nombre }}</div>
        </div>
        <span class="serv-badge" [class.activo]="s.estado === 'Activo'" [class.inactivo]="s.estado !== 'Activo'">
          <i class="bi" [class.bi-check-circle-fill]="s.estado === 'Activo'" [class.bi-x-circle-fill]="s.estado !== 'Activo'"></i>
          {{ s.estado }}
        </span>
      </div>

      <div class="serv-card-repuestos">
        <div class="serv-repuestos-titulo">
          <i class="bi bi-box-seam me-1"></i> Repuestos a usar
          <span class="serv-repuestos-contador">{{ s.repuestos?.length || 0 }}</span>
        </div>
        <div class="serv-repuestos-lista">
          <div *ngFor="let r of s.repuestos" class="serv-repuesto-item">
            <i class="bi bi-dot"></i>
            <span class="flex-grow-1">{{ r.nombre_repuesto }}</span>
            <span class="serv-repuesto-cant">x{{ r.cantidad }}</span>
          </div>
          <div *ngIf="!s.repuestos || s.repuestos.length === 0" class="text-muted small fst-italic">
            Sin repuestos asignados
          </div>
        </div>
      </div>

      <div class="serv-card-footer">
        <button class="btn-accion editar" (click)="abrirEditar(s)" title="Editar">
          <i class="bi bi-pencil-fill"></i> Editar
        </button>
      </div>
    </div>
  </div>

  <!-- Cargando -->
  <div *ngIf="cargando" class="text-center py-5">
    <div class="spinner-border text-danger" role="status"></div>
    <p class="text-muted small mt-2">Cargando servicios...</p>
  </div>

  <!-- Vacío -->
  <div *ngIf="!cargando && serviciosFiltrados.length === 0" class="serv-vacio">
    <i class="bi bi-inbox"></i>
    <p class="mb-0 mt-2">No se encontraron servicios</p>
  </div>
</div>

<!-- OVERLAY: Agregar / Editar -->
<div class="config-overlay" *ngIf="showAgregarOverlay || showEditarOverlay">
  <div class="config-modal">
    <router-outlet></router-outlet>
  </div>
</div>
