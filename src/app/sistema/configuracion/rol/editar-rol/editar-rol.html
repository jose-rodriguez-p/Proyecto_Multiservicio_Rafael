<div class="container-fluid p-4">
  <div class="card border-0 shadow-sm rounded-3">
    <div class="card-header bg-white border-bottom py-3">
      <h4 class="mb-0 text-secondary fw-bold d-flex align-items-center">
        <i class="bi bi-pencil-square me-2 text-danger"></i> Editar Rol: {{ rol.nombre }}
      </h4>
    </div>

    <div class="card-body p-4">
      <div class="row g-4">
        <div class="col-md-6">
          <label class="form-label fw-semibold text-muted small uppercase">Nombre del Rol</label>
          <div class="input-group">
            <span class="input-group-text bg-light text-muted"><i class="bi bi-shield-lock"></i></span>
            <input type="text" class="form-control" [(ngModel)]="rol.nombre" placeholder="Ej. Administrador">
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold text-muted small uppercase">Estado del Rol</label>
          <div class="input-group">
            <span class="input-group-text bg-light text-muted"><i class="bi bi-toggle-on"></i></span>
            <select class="form-select" [(ngModel)]="rol.activo">
              <option [ngValue]="true">Activo</option>
              <option [ngValue]="false">Inactivo</option>
            </select>
          </div>
        </div>

        <div class="col-12 mt-4">
          <label class="form-label fw-bold text-secondary mb-3 d-flex align-items-center">
            <i class="bi bi-list-check me-2 text-danger"></i> Asignación de Menús del Sistema
          </label>
          <div class="row g-3">
            <div class="col-12 col-md-6 col-lg-4" *ngFor="let menu of availableMenus">
              <div class="card h-100 border transition-all shadow-none"
                [class.border-success]="rol.menus?.includes(menu)"
                [class.bg-success]="rol.menus?.includes(menu)"
                [class.bg-opacity-10]="rol.menus?.includes(menu)"
                style="border-radius: 8px;">
                <div class="card-body p-3 d-flex align-items-center">
                  <div class="form-check m-0 d-flex align-items-center w-100" style="cursor: pointer;">
                    <input type="checkbox" class="form-check-input me-3" style="width: 1.25rem; height: 1.25rem; cursor: pointer;"
                      [id]="menu" [checked]="rol.menus?.includes(menu)" (change)="toggleMenu(menu)">
                    <label class="form-check-label fw-medium text-dark flex-grow-1" [htmlFor]="menu" style="cursor: pointer; user-select: none;">
                      {{ menu }}
                    </label>
                    <i class="bi fs-5 ms-auto" [class.bi-check-circle-fill]="rol.menus?.includes(menu)"
                      [class.text-success]="rol.menus?.includes(menu)" [class.bi-circle]="!rol.menus?.includes(menu)"
                      [class.text-muted]="!rol.menus?.includes(menu)"></i>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mt-5 pt-3 border-top d-flex justify-content-end gap-2">
        <button type="button" class="btn btn-light border px-4 fw-medium text-secondary" (click)="regresar()">
          Cancelar
        </button>
        <button type="button" class="btn btn-danger px-4 fw-medium shadow-sm" (click)="actualizarRol()">
          <i class="bi bi-save me-2"></i> Guardar Cambios
        </button>
      </div>
    </div>
  </div>
</div>
