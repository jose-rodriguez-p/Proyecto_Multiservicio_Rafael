<div class="container-fluid p-4 p-md-5">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 gap-3">
        <h2 class="text-secondary fw-bold mb-0">
            <i class="bi bi-shield-lock me-2 text-danger"></i> Gestión de Roles
        </h2>

        <div class="d-flex flex-column flex-md-row gap-2 w-100 w-md-auto">
            <div class="input-group w-100 w-md-auto">
                <span class="input-group-text bg-white border-end-0">
                    <i class="bi bi-search text-muted"></i>
                </span>
                <input
                    type="text"
                    class="form-control border-start-0"
                    placeholder="Buscar por nombre o menú..."
                    [(ngModel)]="filtroBusqueda" />
            </div>

            <button class="btn btn-danger" (click)="abrirModal()">
                <i class="bi bi-plus-circle me-2"></i> Nuevo Rol
            </button>
        </div>
    </div>

    <div class="row g-4">
        <div *ngFor="let rol of rolesFiltrados"
            class="col-12 col-md-6 col-lg-4">
            <div class="card border-0 shadow-sm h-100">

                <div class="card-body">
                    <div class="d-flex justify-content-between mb-3">
                        <div class="bg-danger bg-opacity-10 rounded p-3">
                            <i class="bi bi-shield-lock fs-3 text-danger"></i>
                        </div>
                        <span
                            class="badge"
                            [class.bg-success]="rol.activo"
                            [class.bg-secondary]="!rol.activo">
                            {{ rol.activo ? 'Activo' : 'Inactivo' }}
                        </span>
                    </div>

                    <h5>{{ rol.nombre }}</h5>
                    <p class="text-muted">{{ rol.descripcion }}</p>

                    <div>
                        <div class="fw-semibold mb-2">Menús con acceso</div>
                        <div *ngFor="let m of rol.menus" class="mb-1">
                            <i
                                class="bi bi-check-circle-fill text-success me-2"></i>
                            {{ m }}
                        </div>
                    </div>
                </div>

                <div
                    class="card-footer bg-light d-flex justify-content-end gap-2">
                    <button class="btn btn-outline-dark btn-sm"
                        (click)="abrirModalEdit(rol)">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-outline-danger btn-sm"
                        (click)="eliminarRol(rol.id)">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>

            </div>
        </div>
    </div>

</div>

<div
    class="modal fade"
    [class.show]="mostrarModal"
    [style.display]="mostrarModal ? 'block' : 'none'">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <router-outlet
                (activate)="cargarRoles()">
            </router-outlet>
        </div>
    </div>
</div>

<div *ngIf="mostrarModal" class="modal-backdrop fade show"></div>
