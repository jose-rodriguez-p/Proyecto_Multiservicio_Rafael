<div class="container-fluid p-4 p-md-5">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 mb-md-5 gap-3">
    <h2 class="text-secondary fw-bold mb-0">
      <i class="bi bi-truck me-2 text-danger"></i> Gestión de Proveedores
    </h2>
    <button class="btn btn-danger d-flex align-items-center" (click)="abrirModal()">
      <i class="bi bi-plus-circle me-2"></i> Agregar Proveedor
    </button>
  </div>

  <div class="card border-0 shadow-sm mb-4 mb-md-5">
    <div class="card-body p-3 p-md-4">
      <div class="row g-3 g-md-4 align-items-center">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control border-start-0" placeholder="Buscar por nombre o RUC..." [(ngModel)]="filtroBusqueda" (input)="aplicarFiltros()">
          </div>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
          <select class="form-select" [(ngModel)]="filtroEstado" (change)="aplicarFiltros()">
            <option value="Activo">Activos</option>
            <option value="Inactivo">Inactivos</option>
            <option value="Todos">Todos</option>
          </select>
        </div>
        <div class="col-12 col-lg-5 text-end">
          <div class="btn-group shadow-sm">
            <button class="btn btn-outline-dark btn-sm" (click)="exportarExcel()"><i class="bi bi-file-earmark-excel me-1"></i> Excel</button>
            <button class="btn btn-outline-dark btn-sm" (click)="exportarPDF()"><i class="bi bi-file-earmark-pdf me-1"></i> PDF</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3 g-md-4">
    <div *ngFor="let prov of proveedoresFiltrados" class="col-12 col-sm-6 col-lg-4 col-xl-3">
      <div class="card h-100 shadow-sm border-0 provider-card">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-start mb-3">
            <div class="icon-box bg-danger bg-opacity-10 text-danger rounded-3 p-3">
              <i class="bi bi-building fs-3"></i>
            </div>
            <span class="badge" [class.bg-success]="prov.estado === 'Activo'" [class.bg-secondary]="prov.estado !== 'Activo'">
              {{ prov.estado }}
            </span>
          </div>
          
          <h5 class="fw-bold mb-2 text-truncate" [title]="prov.nombre_empresa">{{ prov.nombre_empresa }}</h5>
          <p class="text-muted small mb-3">RUC: {{ prov.ruc }}</p>
          
          <div class="d-flex align-items-center text-muted small mb-2">
            <i class="bi bi-telephone me-2 flex-shrink-0"></i> {{ prov.celular }}
          </div>
          
          <div class="d-flex align-items-center text-muted small mb-2 text-break" style="min-width: 0;">
            <i class="bi bi-envelope me-2 flex-shrink-0"></i>
            <span>{{ prov.correo }}</span>
          </div>
          
          <div class="d-flex align-items-start text-muted small text-break" style="min-width: 0;">
            <i class="bi bi-geo-alt me-2 mt-1 flex-shrink-0"></i>
            <span>{{ prov.direccion }}</span>
          </div>
        </div>
        
        <div class="card-footer bg-light border-0 d-flex justify-content-end gap-2 p-3">
          <button class="btn btn-sm btn-outline-dark" (click)="abrirModalEdit(prov)">
            <i class="bi bi-pencil me-1"></i> Editar
          </button>
          <!-- <button class="btn btn-sm btn-outline-danger" (click)="eliminarProveedor(prov.ruc)">
            <i class="bi bi-trash me-1"></i> Eliminar
          </button> -->
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" [class.show]="mostrarModal" [style.display]="mostrarModal ? 'block' : 'none'" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
<div *ngIf="mostrarModal" class="modal-backdrop fade show"></div>
