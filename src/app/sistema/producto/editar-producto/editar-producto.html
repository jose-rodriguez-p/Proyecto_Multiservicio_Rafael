<div class="modal-header bg-dark text-white border-0 py-3 py-md-4">
  <h5 class="modal-title fw-bold">
    <i class="bi bi-pencil-square me-2 text-danger"></i> Editar Producto
  </h5>
  <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
</div>

<div class="modal-body p-4 p-md-5">
  <div class="row g-3 g-md-4">

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Nombre <span class="text-danger">*</span></label>
      <input type="text"
        class="form-control form-control-sm bg-light"
        [(ngModel)]="productoEditando.nombre_repuesto"
        readonly>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Marca</label>
      <input type="text"
        class="form-control form-control-sm bg-light"
        [(ngModel)]="productoEditando.nombre_marca"
        readonly>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Categoría</label>
      <input type="text"
        class="form-control form-control-sm bg-light"
        [(ngModel)]="productoEditando.nombre_categoria"
        readonly>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Proveedor</label>
      <input type="text"
        class="form-control form-control-sm bg-light"
        [(ngModel)]="productoEditando.nombre_proveedor"
        readonly>
    </div>

    <div class="col-md-4">
      <label class="form-label fw-bold small mb-2">
        Stock Actual
        <i class="bi bi-lock-fill text-muted ms-1" title="El stock se actualiza automáticamente desde Compras"></i>
      </label>
      <input type="number"
        class="form-control form-control-sm bg-light"
        [(ngModel)]="productoEditando.cantidad"
        readonly>
      <div class="form-text">
        No editable aquí. Para aumentar el stock, registra una
        <a routerLink="/sistema/compra/nueva-compra">nueva compra</a>.
      </div>
    </div>

    <div class="col-md-4">
      <label class="form-label fw-bold small mb-2">Precio Compra (S/) <span class="text-danger">*</span></label>
      <input type="number" min="0.01" step="0.01" max="999.99"
        class="form-control form-control-sm"
        [(ngModel)]="productoEditando.precio_compra"
        (input)="validarPrecioCompra()"
        [ngClass]="{'is-invalid': errorPrecioCompra, 'is-valid': !errorPrecioCompra && productoEditando.precio_compra}">
      <div class="invalid-feedback">El precio de compra debe ser mayor a cero.</div>
    </div>

    <div class="col-md-4">
      <label class="form-label fw-bold small mb-2">Precio Venta (S/) <span class="text-danger">*</span></label>
      <input type="number" min="0.01" step="0.01" max="9999.99"
        class="form-control form-control-sm"
        [(ngModel)]="productoEditando.precio_venta"
        (input)="validarPrecioVenta()"
        [ngClass]="{'is-invalid': errorPrecioVenta || errorPrecioVentaMenor, 'is-valid': !errorPrecioVenta && !errorPrecioVentaMenor && productoEditando.precio_venta}">
      <div class="invalid-feedback" *ngIf="errorPrecioVenta">El precio de venta debe ser mayor a cero.</div>
      <div class="invalid-feedback" *ngIf="errorPrecioVentaMenor">El precio de venta debe ser mayor al precio de compra.</div>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Stock Mínimo</label>
      <input type="number" min="0" step="1" max="999"
        class="form-control form-control-sm"
        [(ngModel)]="productoEditando.stock_minimo"
        (input)="validarStockMinimo()"
        [ngClass]="{'is-invalid': errorStockMinimo, 'is-valid': !errorStockMinimo && productoEditando.stock_minimo >= 0}">
      <div class="invalid-feedback">El stock mínimo no puede ser negativo ni mayor a la cantidad actual.</div>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Estado</label>
      <select class="form-select form-select-sm" [(ngModel)]="productoEditando.estado">
        <option value="Activo">Activo</option>
        <option value="Inactivo">Inactivo</option>
      </select>
    </div>

  </div>
</div>

<div class="modal-footer border-0 p-4 p-md-5">
  <button type="button" class="btn btn-outline-secondary px-4" (click)="cerrarModal()">Cancelar</button>
  <button type="button" class="btn btn-danger px-4"
    (click)="guardarCambios()"
    [disabled]="!datosValidos()">
    Actualizar Producto
  </button>
</div>
