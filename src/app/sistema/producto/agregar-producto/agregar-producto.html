<div class="modal-header bg-danger text-white border-0 py-3 py-md-4">
  <h5 class="modal-title fw-bold">
    <i class="bi bi-box-seam-fill me-2"></i> Nuevo Producto
  </h5>
  <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
</div>

<div class="modal-body p-4 p-md-5">
  <div class="row g-3 g-md-4">

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Código <span class="text-danger">*</span></label>
      <input type="text"
        class="form-control form-control-sm"
        [(ngModel)]="nuevoProducto.codigo"
        (input)="validarCodigo()"
        [ngClass]="{'is-invalid': errorCodigo, 'is-valid': !errorCodigo && nuevoProducto.codigo?.trim()}"
        placeholder="Ej: ACE-001"
        maxlength="20">
      <div class="text-danger small mt-2" *ngIf="errorCodigo">
        El código debe tener entre 2 y 20 caracteres alfanuméricos.
      </div>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Nombre <span class="text-danger">*</span></label>
      <input type="text"
        class="form-control form-control-sm"
        [(ngModel)]="nuevoProducto.nombre"
        (input)="validarNombre()"
        [ngClass]="{'is-invalid': errorNombre, 'is-valid': !errorNombre && nuevoProducto.nombre?.trim()}"
        placeholder="Ej: Aceite Motor 10W40">
      <div class="text-danger small mt-2" *ngIf="errorNombre">
        El nombre debe tener al menos 2 caracteres.
      </div>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Marca</label>
      <input type="text"
        class="form-control form-control-sm"
        [(ngModel)]="nuevoProducto.marca"
        placeholder="Ej: Castrol">
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Categoría</label>
      <select class="form-select form-select-sm" [(ngModel)]="nuevoProducto.id_categoria">
        <option *ngFor="let cat of categorias" [value]="cat.id">{{ cat.nombre }}</option>
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Proveedor</label>
      <select class="form-select form-select-sm" [(ngModel)]="nuevoProducto.ruc_proveedor">
        <option value="">Seleccione un proveedor</option>
        <option *ngFor="let prov of proveedores" [value]="prov.ruc">{{ prov.nombre_empresa }} ({{ prov.ruc }})</option>
      </select>
    </div>

    <div class="col-md-4">
      <label class="form-label fw-bold small mb-2">Cantidad Inicial <span class="text-danger">*</span></label>
      <input type="number" min="0"
        class="form-control form-control-sm"
        [(ngModel)]="nuevoProducto.cantidad"
        (input)="validarCantidad()"
        [ngClass]="{'is-invalid': errorCantidad, 'is-valid': !errorCantidad && nuevoProducto.cantidad !== null}">
      <div class="text-danger small mt-2" *ngIf="errorCantidad">
        La cantidad no puede ser negativa.
      </div>
    </div>

    <div class="col-md-4">
      <label class="form-label fw-bold small mb-2">Precio Compra (S/) <span class="text-danger">*</span></label>
      <input type="number" min="0" step="0.01"
        class="form-control form-control-sm"
        [(ngModel)]="nuevoProducto.precio_compra"
        (input)="validarPrecioCompra()"
        [ngClass]="{'is-invalid': errorPrecioCompra, 'is-valid': !errorPrecioCompra && nuevoProducto.precio_compra !== null}">
      <div class="text-danger small mt-2" *ngIf="errorPrecioCompra">
        El precio de compra no puede ser negativo.
      </div>
    </div>

    <div class="col-md-4">
      <label class="form-label fw-bold small mb-2">Precio Venta (S/) <span class="text-danger">*</span></label>
      <input type="number" min="0.01" step="0.01"
        class="form-control form-control-sm"
        [(ngModel)]="nuevoProducto.precio_venta"
        (input)="validarPrecioVenta()"
        [ngClass]="{'is-invalid': errorPrecioVenta || errorPrecioVentaMenor, 'is-valid': !errorPrecioVenta && !errorPrecioVentaMenor && nuevoProducto.precio_venta}">
      <div class="text-danger small mt-2" *ngIf="errorPrecioVenta">
        El precio de venta debe ser mayor a cero.
      </div>
      <div class="text-danger small mt-2" *ngIf="errorPrecioVentaMenor">
        El precio de venta debe ser mayor al precio de compra.
      </div>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Stock Mínimo</label>
      <input type="number" min="0"
        class="form-control form-control-sm"
        [(ngModel)]="nuevoProducto.stock_minimo">
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small mb-2">Estado</label>
      <select class="form-select form-select-sm" [(ngModel)]="nuevoProducto.estado">
        <option value="Activo">Activo</option>
        <option value="Inactivo">Inactivo</option>
      </select>
    </div>

  </div>
</div>

<div class="modal-footer border-0 p-4 p-md-5">
  <button type="button" class="btn btn-outline-secondary px-4" (click)="cerrarModal()">Cancelar</button>
  <button type="button" class="btn btn-danger px-4"
    (click)="guardarProducto()"
    [disabled]="!datosValidos()">
    Registrar Producto
  </button>
</div>
